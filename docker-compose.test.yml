version: '3.9'

services:
  db-test:
    image: postgres:16-alpine
    restart: 'no'
    environment:
      POSTGRES_DB: mdmsystems_test
      POSTGRES_USER: mdm_test
      POSTGRES_PASSWORD: mdm_test_password
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mdm_test -d mdmsystems_test']
      interval: 3s
      timeout: 5s
      retries: 15
