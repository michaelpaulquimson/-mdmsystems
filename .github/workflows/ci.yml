name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck · Lint · Test · Audit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mdmsystems_test
          POSTGRES_USER: mdm_test
          POSTGRES_PASSWORD: mdm_test_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL_TEST: postgres://mdm_test:mdm_test_password@localhost:5433/mdmsystems_test
      JWT_SECRET: ci_jwt_secret_at_least_32_characters_long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit --workspaces --if-present

      - name: Integration tests
        run: npm run test:integration --workspaces --if-present

      - name: E2E tests
        run: npm run test -w e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Security audit
        run: npm audit --audit-level=high --workspaces
