version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mdmsystems}
      POSTGRES_USER: ${POSTGRES_USER:-mdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdm_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mdm} -d ${POSTGRES_DB:-mdmsystems}']
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-mdm}:${POSTGRES_PASSWORD:-mdm_dev_password}@db:5432/${POSTGRES_DB:-mdmsystems}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — copy .env.example to .env}
      BACKEND_PORT: ${BACKEND_PORT:-4000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    volumes:
      - ./backend/src:/app/backend/src:delegated
      - ./shared/src:/app/shared/src:delegated

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./frontend/src:/app/frontend/src:delegated
      - ./shared/src:/app/shared/src:delegated

volumes:
  postgres_data:
